<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Cyan glow filter for main text -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for terminal box -->
    <filter id="boxGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Vertical scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#00d4ff" opacity="0.012"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.07"/>
    </pattern>

    <!-- Finer grid overlay -->
    <pattern id="gridFine" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#00d4ff" stroke-width="0.15" opacity="0.03"/>
    </pattern>

    <!-- Gradient for the horizontal accent line -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Top-down ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for terminal box rounded corners -->
    <clipPath id="termClip">
      <rect x="340" y="370" width="520" height="52" rx="6"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#020408"/>

  <!-- Fine grid -->
  <rect width="1200" height="630" fill="url(#gridFine)"/>

  <!-- Main grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient top glow -->
  <rect width="1200" height="630" fill="url(#ambientGlow)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Decorative circuit lines — left side -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1" fill="none">
    <path d="M 0 315 L 80 315 L 120 275 L 200 275"/>
    <circle cx="200" cy="275" r="2.5" fill="#00d4ff"/>
    <path d="M 0 340 L 60 340 L 100 380 L 160 380"/>
    <circle cx="160" cy="380" r="2" fill="#00d4ff"/>
    <path d="M 0 290 L 40 290 L 70 260 L 140 260"/>
    <circle cx="140" cy="260" r="2" fill="#00d4ff"/>
  </g>

  <!-- Decorative circuit lines — right side -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1" fill="none">
    <path d="M 1200 315 L 1120 315 L 1080 275 L 1000 275"/>
    <circle cx="1000" cy="275" r="2.5" fill="#00d4ff"/>
    <path d="M 1200 340 L 1140 340 L 1100 380 L 1040 380"/>
    <circle cx="1040" cy="380" r="2" fill="#00d4ff"/>
    <path d="M 1200 290 L 1160 290 L 1130 260 L 1060 260"/>
    <circle cx="1060" cy="260" r="2" fill="#00d4ff"/>
  </g>

  <!-- Main "sudo" text — glow layer -->
  <text x="600" y="260" text-anchor="middle"
        font-family="'Courier New', 'SF Mono', monospace" font-weight="900"
        font-size="168" letter-spacing="0.18em"
        fill="#00d4ff" opacity="0.5" filter="url(#cyanGlow)">sudo</text>

  <!-- Main "sudo" text — sharp layer -->
  <text x="600" y="260" text-anchor="middle"
        font-family="'Courier New', 'SF Mono', monospace" font-weight="900"
        font-size="168" letter-spacing="0.18em"
        fill="#00d4ff">sudo</text>

  <!-- Thin horizontal accent line -->
  <rect x="200" y="290" width="800" height="1" fill="url(#lineGrad)"/>

  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="300"
        font-size="26" letter-spacing="0.25em"
        fill="#d4e0ec" opacity="0.85">UNLOCK MORE FROM SMARTER DEV</text>

  <!-- Terminal box background -->
  <rect x="340" y="370" width="520" height="52" rx="6"
        fill="#080c14" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- Terminal box inner shadow -->
  <rect x="341" y="371" width="518" height="50" rx="5"
        fill="none" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.05"/>

  <!-- Terminal dots -->
  <circle cx="360" cy="396" r="4" fill="#ef4444" opacity="0.7"/>
  <circle cx="374" cy="396" r="4" fill="#eab308" opacity="0.7"/>
  <circle cx="388" cy="396" r="4" fill="#22c55e" opacity="0.7"/>

  <!-- Terminal text: $ -->
  <text x="412" y="401" font-family="'Courier New', 'SF Mono', monospace"
        font-size="16" font-weight="bold" fill="#eab308" opacity="0.9">$</text>

  <!-- Terminal text: sudo -->
  <text x="430" y="401" font-family="'Courier New', 'SF Mono', monospace"
        font-size="16" font-weight="bold" fill="#00d4ff">sudo</text>

  <!-- Terminal text: smarter-dev unlock -->
  <text x="488" y="401" font-family="'Courier New', 'SF Mono', monospace"
        font-size="16" fill="#8098b0">smarter-dev --unlock</text>

  <!-- Blinking cursor -->
  <rect x="692" y="388" width="9" height="17" fill="#00d4ff" opacity="0.8"/>

  <!-- Bottom URL -->
  <text x="600" y="565" text-anchor="middle"
        font-family="'Courier New', 'SF Mono', monospace" font-weight="400"
        font-size="15" letter-spacing="0.12em"
        fill="#4a6078">smarter.dev/sudo</text>

  <!-- Very subtle corner brackets — top left -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.1" fill="none">
    <path d="M 30 30 L 30 60"/>
    <path d="M 30 30 L 60 30"/>
  </g>

  <!-- Top right -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.1" fill="none">
    <path d="M 1170 30 L 1170 60"/>
    <path d="M 1170 30 L 1140 30"/>
  </g>

  <!-- Bottom left -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.1" fill="none">
    <path d="M 30 600 L 30 570"/>
    <path d="M 30 600 L 60 600"/>
  </g>

  <!-- Bottom right -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.1" fill="none">
    <path d="M 1170 600 L 1170 570"/>
    <path d="M 1170 600 L 1140 600"/>
  </g>
</svg>
