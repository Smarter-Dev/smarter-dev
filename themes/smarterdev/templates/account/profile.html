{% extends "account/_layout.html" %}

{% block account_content %}
<h1>Public profile</h1>
<p class="account-meta">How you appear to other developers in Smarter Dev's spaces.</p>

<div class="account-card">
    <form method="post" action="/account" class="account-form" data-sk-no-spa>
        <div class="form-row">
            <label for="display_name">Display name</label>
            <input type="text" id="display_name" name="display_name" maxlength="255" value="{{ user.name or '' }}">
        </div>
        <div class="form-row">
            <label for="handle">Handle</label>
            <input type="text" id="handle" name="handle" maxlength="40" value="{{ profile.handle or '' }}" placeholder="@yourhandle">
        </div>
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" value="{{ user.email or '' }}" disabled>
            <p class="account-meta" style="margin-top:.3rem;">Email is managed by your sign-in provider.</p>
        </div>
        <div class="form-row">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" maxlength="500" placeholder="A short blurb that shows up next to your contributions.">{{ profile.bio or '' }}</textarea>
        </div>
        <div class="form-row">
            <label for="timezone">Timezone</label>
            <input type="text" id="timezone" name="timezone" maxlength="64" value="{{ profile.timezone or '' }}" placeholder="America/Chicago">
        </div>
        <div class="account-actions">
            <a href="/account" class="account-btn-outline">Cancel</a>
            <button type="submit" class="account-btn-primary">Save profile</button>
        </div>
    </form>
</div>
{% endblock %}
