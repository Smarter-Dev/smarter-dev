{% extends "base.html" %}

{% block page_type %}page{% endblock %}
{% block page_title %}{{ page.title }}{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{{ theme_url('css/pages/blog.css') }}">
{% endblock %}

{% block content %}
<header class="article-header reveal">
    <h1 class="article-title">{{ page.title }}</h1>
</header>

<article class="article-body">
    <div class="reveal">
        {{ page.content|markdown|safe }}
    </div>
</article>
{% endblock %}
