<article class="vc-course-card"
         data-tools="{{ r.tool_slugs|join(' ') }}"
         data-click-count="{{ r.click_count }}">
    <a class="vc-course-link" href="{{ r.url }}"
       data-track-key="{{ r.key }}"
       target="_blank" rel="noopener" data-sk-no-spa>
        <h4 class="vc-course-title">{{ r.title }}</h4>
    </a>
    <p class="vc-course-meta">
        <span class="vc-course-category">{{ r.learning_type }}</span>
        <span class="vc-course-source">{{ r.source }}</span>
        {% if r.published_at %}
        <span class="vc-course-date">{{ r.published_at.strftime("%b %Y") }}</span>
        {% endif %}
    </p>
    {% if r.blurb %}<p class="vc-course-blurb">{{ r.blurb }}</p>{% endif %}
</article>
