# Alice @mentions the bot to ask something completely off-topic (recipe).
# Directed (>=5) but NOT a coding topic, so under the "lean quiet" policy
# EITHER is acceptable: a no-response turn (silence on off-topic chatter,
# even when pinged) OR a SendResponse with not_cs_topic_brief_answer=True
# capped at 2 sentences. What's NOT acceptable: a long paragraph reply.

me:
  user_id: "999"
  username: "smarterbot"

channel:
  id: "100"
  name: "general"

authors:
  - user_id: "1"
    username: "alice"

trigger:
  id: "60"
  from: "1"
  body: "@smarterbot what's the best way to roast brussels sprouts?"
  mentions_bot: true
