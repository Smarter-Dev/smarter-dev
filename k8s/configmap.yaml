---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smarter-dev-config
  namespace: smarter-dev
data:
  # Environment configuration
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  
  # Web server configuration
  WEB_HOST: "0.0.0.0"
  WEB_PORT: "8000"
  
  # Skrift CMS environment
  SKRIFT_ENV: "production"

  # Discord OAuth redirect URI
  DISCORD_REDIRECT_URI: "https://smarter.dev/bot-admin/auth/discord/callback"
  
  # Rate limiting configuration
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  
  # Bot API configuration
  API_BASE_URL: "http://smarter-dev-website:8000/api"

  # Site base URL
  SITE_BASE_URL: "https://smarter.dev"

  # LLM Model Configuration
  LLM_FAST_MODEL: "gemini/gemini-3.1-flash-lite"
  LLM_MEDIUM_MODEL: "claude-haiku-4-5-20251001"
  LLM_JUDGE_MODEL: "gemini/gemini-3.1-flash-lite"

  # Discord voice message configuration
  VOICE_TTS_MODEL: "gemini-2.5-flash-preview-tts"
  VOICE_TTS_VOICE: "Kore"
  VOICE_TTS_SAMPLE_RATE: "24000"
  VOICE_TTS_CHANNELS: "1"
  VOICE_TTS_SAMPLE_WIDTH: "2"
  VOICE_MAX_INPUT_CHARS: "800"
  VOICE_WORDS_PER_MINUTE: "150"
  VOICE_MAX_DURATION_SECONDS: "30"
  VOICE_OPUS_BITRATE: "48k"
