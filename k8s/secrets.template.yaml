# Kubernetes Secrets Template
# This file shows the structure of secrets needed for the application.
# Replace ALL values with actual secrets before applying to cluster.

apiVersion: v1
kind: Secret
metadata:
  name: smarter-dev-secrets
  namespace: smarter-dev
type: Opaque
stringData:
  # Database Configuration
  database-url: "postgresql+asyncpg://username:password@hostname:5432/database"
  redis-url: "redis://:password@hostname:6379/0"
  
  # Discord Bot Configuration
  discord-bot-token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  discord-application-id: "YOUR_DISCORD_APPLICATION_ID_HERE"
  
  # Discord OAuth (for admin interface)
  discord-client-id: "YOUR_DISCORD_CLIENT_ID_HERE"
  discord-client-secret: "YOUR_DISCORD_CLIENT_SECRET_HERE"
  
  # Application Secrets
  api-secret-key: "your-secure-api-secret-key-here"
  web-session-secret: "your-secure-web-session-secret-here"
  
  # Bot API Authentication
  bot-api-key: "sk_your-secure-bot-api-key-here"
  
  # Jina Reader API
  jina-api-key: "YOUR_JINA_API_KEY_HERE"

  # Brave Search API (for Scan research agent)
  brave-search-api-key: "YOUR_BRAVE_SEARCH_API_KEY_HERE"

  # YouTube Data API v3 (for video search in Scan)
  youtube-api-key: "YOUR_YOUTUBE_API_KEY_HERE"

  # OpenAI API Key (for GPT 5.4 Nano - Scan lite stack research)
  openai-api-key: "YOUR_OPENAI_API_KEY_HERE"

  # OpenRouter API Key (for Poolside Laguna chat models)
  openrouter-api-key: "YOUR_OPENROUTER_API_KEY_HERE"
  logfire-token: "YOUR_LOGFIRE_WRITE_TOKEN_HERE"

  # DigitalOcean serverless inference (OpenAI-compatible) — hosts the
  # Kimi/GLM/DeepSeek/Gemma/Qwen channel-override catalog models
  digitalocean-inference-api-key: "YOUR_DIGITALOCEAN_INFERENCE_API_KEY_HERE"

  # Stripe (sudo membership billing)
  polar-access-token: "polar_oat_xxx"
  polar-webhook-secret: "polar_whs_xxx"

  # GitHub OAuth
  github-client-id: "YOUR_GITHUB_CLIENT_ID_HERE"
  github-client-secret: "YOUR_GITHUB_CLIENT_SECRET_HERE"

  # Google OAuth
  google-client-id: "YOUR_GOOGLE_CLIENT_ID_HERE"
  google-client-secret: "YOUR_GOOGLE_CLIENT_SECRET_HERE"

  # Analytics
  google-analytics-id: "G-XXXXXXXXXX"
  
---
# Optional: Sentry configuration for error tracking
apiVersion: v1
kind: Secret
metadata:
  name: smarter-dev-monitoring
  namespace: smarter-dev
type: Opaque
stringData:
  sentry-dsn: "YOUR_SENTRY_DSN_HERE"
