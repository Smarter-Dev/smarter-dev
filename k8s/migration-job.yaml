apiVersion: batch/v1
kind: Job
metadata:
  name: smarter-dev-migration
  namespace: smarter-dev
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migration
        image: zzmmrmn/smarter-dev-website:<IMAGE_VERSION>
        command: ["uv", "run", "alembic", "-c", "alembic/alembic.ini", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: smarter-dev-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: smarter-dev-secrets
              key: secret-key
        - name: SKRIFT_ENV
          value: "production"
  backoffLimit: 3
