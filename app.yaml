site_name: Smarter Dev
theme: smarterdev
domain: smarter.dev
oauth2_enabled: true

db:
  url: $DATABASE_URL
  schema: skrift

session:
  cookie_domain: ".smarter.dev"

auth:
  redirect_base_url: "https://smarter.dev"
  allowed_redirect_domains:
    - "*.smarter.dev"
  providers:
    discord:
      client_id: $DISCORD_APPLICATION_ID
      client_secret: $DISCORD_APPLICATION_SECRET
      scopes:
        - identify
        - email
    github:
      client_id: $GITHUB_CLIENT_ID
      client_secret: $GITHUB_CLIENT_SECRET
      scopes:
        - user:email
    google:
      client_id: $GOOGLE_CLIENT_ID
      client_secret: $GOOGLE_CLIENT_SECRET
      scopes:
        - openid
        - email
        - profile
  # Discoverable passkey sign-in. `factor_key: passkey` ties primary login to
  # the `second_factors.passkey` enrollment store, so a passkey added from the
  # account page (while logged in via OAuth) also works as a login method.
  methods:
    passkey:
      type: passkey
      label: Passkey
      factor_key: passkey
  second_factors:
    enabled: true
    # Keep OAuth logins unchallenged — passkeys are purely additive, never a
    # forced second factor for users who already sign in with a provider.
    challenge_on_enrolled: false
    methods:
      passkey:
        type: passkey

controllers:
  - skrift.admin.controller:AdminController
  - skrift.controllers.auth:AuthController
  - smarter_dev.web.home_controller:HomeController
  - smarter_dev.web.controllers:SudoController
  - smarter_dev.web.controllers:discord_redirect
  - smarter_dev.web.account_controller:AccountController
  - smarter_dev.web.account_controller:BillingController
  - smarter_dev.web.feature_flags_admin:FeatureFlagsAdminController
  - smarter_dev.web.controllers:api_mount
  - smarter_dev.web.controllers:bot_admin_mount
  - smarter_dev.web.resources_controller:resources_index
  - smarter_dev.web.agent_api:ResourcesAgentApiController
  - smarter_dev.web.agent_api:AgentConversationApiController
  - smarter_dev.web.agent_api:AgentMessageApiController
  - smarter_dev.web.agent_view_controller:answer_view
  - smarter_dev.web.vibe_courses_controller:vibe_courses
  - smarter_dev.web.vibe_courses_controller:vibe_courses_legacy_redirect
  - smarter_dev.web.vibe_courses_controller:vibe_courses_resources_redirect
  - smarter_dev.web.system_architecture_controller:system_architecture
  - smarter_dev.web.infrastructure_hosting_controller:infrastructure_hosting
  - smarter_dev.web.production_operations_controller:production_operations
  - smarter_dev.web.software_delivery_controller:software_delivery
  - smarter_dev.web.patterns_of_practice_controller:patterns_of_practice
  - smarter_dev.web.agent_engineering_patterns_controller:agent_engineering_patterns
  - smarter_dev.web.campaign_signups_admin:CampaignSignupsAdminController
  - smarter_dev.web.campaign_signups_api:CampaignSignupsApiController
  - smarter_dev.web.click_tracking_api:ClickTrackingApiController
  - smarter_dev.web.click_tracking_admin:ClickTrackingAdminController
  - smarter_dev.web.jina_cache_admin:JinaCacheAdminController
  - smarter_dev.web.usage_admin:UsageAdminController
  - smarter_dev.web.bot_admin_skrift:BotAdminController
  - smarter_dev.web.handlers_admin:HandlersAdminController
  - smarter_dev.web.quests_admin:QuestsAdminController
  - smarter_dev.web.chat_conversations_admin:ChatConversationsAdminController
  - smarter_dev.web.mod_actions_admin:ModActionsAdminController
  - smarter_dev.web.blog_controller:BlogController
  - smarter_dev.web.blogging_agent_admin:BloggingAgentAdminController

# Partials system (SPA navigation)
partials:
  enabled: true

middleware:
  - smarter_dev.web.banner_middleware:SudoLaunchBannerMiddleware

storage:
  default: default
  stores:
    default:
      backend: s3
      max_upload_size: 10485760
      s3:
        bucket: production-bucket-zechz-1234
        region: sfo3
        endpoint_url: https://sfo3.digitaloceanspaces.com
        access_key_id: $SPACES_ACCESS_KEY
        secret_access_key: $SPACES_SECRET_KEY
        acl: public-read
        public_url: https://production-bucket-zechz-1234.sfo3.digitaloceanspaces.com

redis:
  url: $REDIS_URL

security_headers:
  enabled: true
  content_security_policy: "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src-attr 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https:; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://polar.sh https://*.polar.sh"

notifications:
  backend: "skrift.lib.notification_backends:RedisBackend"

workers:
  enabled: true
  # 'distributed' preset → execution: out_of_process + Redis-distributed
  # backends (Redis queue + state store, SQLAlchemy dead-letter + archive).
  # The web pods now SUBMIT jobs only: under out_of_process, asgi startup
  # configures the runtime but does NOT start a consumer pool, so submit()
  # enqueues to the shared Redis queue and returns. A dedicated
  # agent-worker Deployment (k8s/deploy-worker.yaml, running
  # `skrift workers run`) drains that queue and executes every agent/LLM
  # job out-of-process, in its own pod. Requires REDIS_URL (shared with
  # the web pods) so producer and consumer see the same queue.
  preset: distributed
  queues:
    - agents
  # Global claim-timeout for the worker pool. The blogging orchestrator
  # job runs the whole 5-stage pipeline inside one claim and can take
  # well over 10 minutes when Research dispatches a chatty sub-agent.
  # If the claim expires mid-pipeline, another worker re-claims the
  # same job → two orchestrator coroutines run in parallel for the same
  # run_id, dropping each other's per-run cache mid-flight. 30 min
  # gives every realistic pipeline run room to finish under one claim.
  visibility_timeout: 1800
  # Consumed by the agent-worker tier (the web pods don't run a consumer
  # pool under out_of_process). The blogging orchestrator @handler runs
  # the whole pipeline in one job and blocks on each stage agent's
  # `session.result()`; with concurrency=1 it would hold the only slot
  # and nothing could pick up the stage jobs it enqueues — deadlock. 8
  # lets the orchestrator plus ~5 simultaneous stage / sub-agent /
  # tool-call jobs run side by side. `skrift workers run` reads this as
  # its default concurrency (also passed explicitly in the manifest).
  concurrency: 8
  backends:
    # Pin queue + state + event log to Postgres so jobs and their state
    # survive restarts AND a Redis flush (the distributed preset would
    # otherwise keep them in Redis). This makes scheduled/timer handlers
    # genuinely durable: a pending fire lives in `worker_queue` until due,
    # and the recurring re-enqueue chain can't be lost to an ephemeral
    # Redis. Affects ALL worker jobs (resources/blogging/handlers), which
    # are low-volume and human-triggered, so Postgres is plenty. The web
    # pods still only submit (out_of_process); the agent-worker drains the
    # shared Postgres queue.
    state_store: skrift.workers.sqlalchemy:SQLAlchemyStateStore
    queue: skrift.workers.sqlalchemy:SQLAlchemyQueue
    event_log: skrift.workers.sqlalchemy:SQLAlchemyEventLog
  # Handler modules imported by BOTH tiers: the agent-worker imports them
  # to register the @handlers it executes; the web tier imports them so
  # submit() can resolve each payload to its job type. (Until the Skrift
  # lazy-Agent change lands — ZechCodes/Skrift#155 — importing these still
  # pulls pydantic-ai into the web pods; execution, however, is now fully
  # off the web tier.)
  imports:
    - smarter_dev.web.resources_agent
    - smarter_dev.web.resources_jobs
    - smarter_dev.web.title_agent
    - smarter_dev.web.blogging_agent.pipeline
    - smarter_dev.web.handlers_jobs
    - smarter_dev.web.admin_handlers_jobs

agents:
  default_queue: agents
  tool_call_queue: agents
  blob_backend: skrift.agents.blob:InMemoryBlobStore
  # The blogging orchestrator is itself a worker job — once a worker
  # claims it, every stage / sub-agent / tool call should execute inside
  # that same worker's coroutine. The orchestrator awaits each stage's
  # session.result() inline; queuing them as separate worker jobs would
  # just add hop latency (or deadlock with low concurrency) for no
  # durability win — there's nothing to recover for an agent run that
  # the parent is blocking on anyway.
  default_subagent_dispatch: inline

# Legacy site — existing Starlette app serves from subdomain
legacy:
  subdomain: legacy.smarter.dev
