site_name: Smarter Dev
theme: smarterdev

db:
  url: $DATABASE_URL
  schema: skrift

auth:
  redirect_base_url: "https://smarter.dev"
  providers:
    discord:
      client_id: $DISCORD_APPLICATION_ID
      client_secret: $DISCORD_APPLICATION_SECRET
      scopes:
        - identify
        - email

controllers:
  - skrift.admin.controller:AdminController
  - skrift.controllers.auth:AuthController
  - skrift.controllers.web:WebController
  - smarter_dev.web.controllers:SudoController
  - smarter_dev.web.controllers:discord_redirect
  - smarter_dev.web.controllers:api_mount
  - smarter_dev.web.controllers:bot_admin_mount
  - smarter_dev.web.campaign_signups_admin:CampaignSignupsAdminController
  - smarter_dev.web.campaign_signups_api:CampaignSignupsApiController

# Partials system (SPA navigation)
partials:
  enabled: true

# Page types — auto-generates admin CRUD, public listing, and detail routes
page_types:
  - name: post
    plural: posts
    icon: pen-tool

storage:
  default: default
  stores:
    default:
      backend: s3
      max_upload_size: 10485760
      s3:
        bucket: production-bucket-zechz-1234
        region: sfo3
        endpoint_url: https://sfo3.digitaloceanspaces.com
        access_key_id: $SPACES_ACCESS_KEY
        secret_access_key: $SPACES_SECRET_KEY
        acl: public-read
        public_url: https://production-bucket-zechz-1234.sfo3.digitaloceanspaces.com

# Legacy site — existing Starlette app serves from subdomain
legacy:
  subdomain: legacy.smarter.dev
