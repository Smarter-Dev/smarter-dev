on:
  push:
    branches:
      - main


jobs:
  build-and-deploy:
    name: Build and Deploy to K8s on Digital Ocean
    runs-on: ubuntu-latest
    steps:

    - name: Checkout the repo
      uses: actions/checkout@main

    - name: Get latest commit SHA for the version tag
      run: echo $GITHUB_SHA > $GITHUB_WORKSPACE/_meta

    - name: Update deployment files with new image tag
      run: |
        TAG=$(echo $GITHUB_SHA | head -c7)
        sed -i 's|<IMAGE_VERSION>|'${TAG}'|' $GITHUB_WORKSPACE/k8s/deploy.yaml
        sed -i 's|<IMAGE_VERSION>|'${TAG}'|' $GITHUB_WORKSPACE/k8s/deploy-bot.yaml
        sed -i 's|<IMAGE_VERSION>|'${TAG}'|' $GITHUB_WORKSPACE/k8s/deploy-worker.yaml
        sed -i 's|<IMAGE_VERSION>|'${TAG}'|' $GITHUB_WORKSPACE/k8s/cron-sudo-sweep.yaml
        sed -i 's|<IMAGE_VERSION>|'${TAG}'|' $GITHUB_WORKSPACE/k8s/migrate-job.yaml

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Configure kubectl
      run: doctl kubernetes cluster kubeconfig save production-hosting && kubectl config set-context --current --namespace=smarter-dev

    - name: Log Docker in
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

    - name: Build web container image
      run: docker build -f Dockerfile.web -t zzmmrmn/smarter-dev-website:$(echo $GITHUB_SHA | head -c7) .

    - name: Build bot container image
      run: docker build -f Dockerfile.bot -t zzmmrmn/smarter-dev-bot:$(echo $GITHUB_SHA | head -c7) .

    - name: Push web image to Docker Hub
      run: docker push zzmmrmn/smarter-dev-website:$(echo $GITHUB_SHA | head -c7)

    - name: Push bot image to Docker Hub
      run: docker push zzmmrmn/smarter-dev-bot:$(echo $GITHUB_SHA | head -c7)

    - name: Create namespace if not exists
      run: kubectl apply -f $GITHUB_WORKSPACE/k8s/namespace.yaml

    - name: Apply ConfigMap
      run: kubectl apply -f $GITHUB_WORKSPACE/k8s/configmap.yaml

    # Apply this project's app-schema migrations before rolling the new images,
    # so the new code never starts against an old schema. Runs in-cluster (the
    # DB's only trusted source) as a one-shot Job with admin creds. A failed
    # migration fails this step and halts the deploy (Jobs use backoffLimit 0).
    - name: Run database migrations
      run: |
        kubectl delete job smarter-dev-migrate -n smarter-dev --ignore-not-found
        kubectl apply -f $GITHUB_WORKSPACE/k8s/migrate-job.yaml
        echo "waiting for migration job (up to 5 min)..."
        for i in $(seq 1 60); do
          COMPLETE=$(kubectl get job smarter-dev-migrate -n smarter-dev -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
          FAILED=$(kubectl get job smarter-dev-migrate -n smarter-dev -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
          [ "$COMPLETE" = "True" ] || [ "$FAILED" = "True" ] && break
          sleep 5
        done
        kubectl logs job/smarter-dev-migrate -n smarter-dev || true
        if [ "$COMPLETE" != "True" ]; then
          echo "::error::migration job did not complete (complete=$COMPLETE failed=$FAILED)"; exit 1
        fi
        echo "migrations applied"

    - name: Deploy to DigitalOcean Kubernetes
      run: |
        kubectl apply -f $GITHUB_WORKSPACE/k8s/deploy.yaml
        kubectl apply -f $GITHUB_WORKSPACE/k8s/deploy-bot.yaml
        kubectl apply -f $GITHUB_WORKSPACE/k8s/deploy-worker.yaml
        kubectl apply -f $GITHUB_WORKSPACE/k8s/site.yaml
        kubectl apply -f $GITHUB_WORKSPACE/k8s/cron-sudo-sweep.yaml

    - name: Verify web deployment
      run: kubectl rollout status deployment/smarter-dev-website

    - name: Verify bot deployment
      run: kubectl rollout status deployment/smarter-dev-bot

    - name: Verify agent-worker deployment
      run: kubectl rollout status deployment/smarter-dev-agent-worker
