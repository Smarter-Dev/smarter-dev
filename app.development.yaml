site_name: Smarter Dev
theme: smarterdev
debug: true
domain: localhost
oauth2_enabled: true

db:
  url: $DATABASE_URL
  schema: skrift

auth:
  redirect_base_url: "http://localhost:8000"
  # Local dev uses Skrift's built-in dummy provider so contributors can stand
  # the stack up with no OAuth credentials. Production (app.yaml) uses real
  # OAuth providers; Skrift refuses to start with `dummy` configured in prod.
  providers:
    dummy: {}
  # Mirror prod's passkey wiring so the flow can be exercised locally. WebAuthn
  # treats http://localhost as a secure context, so passkeys work in dev.
  methods:
    passkey:
      type: passkey
      label: Passkey
      factor_key: passkey
  second_factors:
    enabled: true
    challenge_on_enrolled: false
    methods:
      passkey:
        type: passkey

controllers:
  - skrift.admin.controller:AdminController
  - skrift.controllers.auth:AuthController
  - smarter_dev.web.home_controller:HomeController
  - smarter_dev.web.controllers:SudoController
  - smarter_dev.web.controllers:discord_redirect
  - smarter_dev.web.account_controller:AccountController
  - smarter_dev.web.account_controller:BillingController
  - smarter_dev.web.feature_flags_admin:FeatureFlagsAdminController
  # Native bot API (/api) — Litestar controllers replacing the FastAPI mount
  # (docs/v2/legacy-sunset/04-api-rewrite.md switchover).
  - smarter_dev.web.api_native.auth:ApiHealthController
  - smarter_dev.web.api_native.auth:AuthController
  - smarter_dev.web.api_native.bytes:BytesController
  - smarter_dev.web.api_native.squads:SquadController
  - smarter_dev.web.api_native.squads:SquadSaleEventController
  - smarter_dev.web.api_native.members:MemberController
  - smarter_dev.web.api_native.challenges:ChallengeController
  - smarter_dev.web.api_native.quests:QuestController
  - smarter_dev.web.api_native.messages:ScheduledMessageController
  - smarter_dev.web.api_native.messages:RepeatingMessageController
  - smarter_dev.web.api_native.advent_of_code:AdventOfCodeController
  - smarter_dev.web.api_native.forum:ForumAgentController
  - smarter_dev.web.api_native.forum:ForumNotificationController
  - smarter_dev.web.api_native.chat_conversations:ChatConversationController
  - smarter_dev.web.api_native.image_quota:ImageQuotaController
  - smarter_dev.web.api_native.activity:ActivityController
  - smarter_dev.web.api_native.model_overrides:ChannelModelOverrideController
  - smarter_dev.web.api_native.handlers:HandlerController
  - smarter_dev.web.api_native.admin_handlers:AdminHandlerController
  - smarter_dev.web.api_native.admin:AdminController
  - smarter_dev.web.api_native.billing:PolarWebhookController
  - smarter_dev.web.api_native.billing:SudoConvergeController
  - smarter_dev.web.resources_controller:resources_index
  - smarter_dev.web.agent_api:ResourcesAgentApiController
  - smarter_dev.web.agent_api:AgentConversationApiController
  - smarter_dev.web.agent_api:AgentMessageApiController
  - smarter_dev.web.agent_view_controller:answer_view
  - smarter_dev.web.vibe_courses_controller:vibe_courses
  - smarter_dev.web.vibe_courses_controller:vibe_courses_legacy_redirect
  - smarter_dev.web.vibe_courses_controller:vibe_courses_resources_redirect
  - smarter_dev.web.system_architecture_controller:system_architecture
  - smarter_dev.web.infrastructure_hosting_controller:infrastructure_hosting
  - smarter_dev.web.production_operations_controller:production_operations
  - smarter_dev.web.software_delivery_controller:software_delivery
  - smarter_dev.web.patterns_of_practice_controller:patterns_of_practice
  - smarter_dev.web.agent_engineering_patterns_controller:agent_engineering_patterns
  - smarter_dev.web.campaign_signups_admin:CampaignSignupsAdminController
  - smarter_dev.web.campaign_signups_api:CampaignSignupsApiController
  - smarter_dev.web.click_tracking_api:ClickTrackingApiController
  - smarter_dev.web.click_tracking_admin:ClickTrackingAdminController
  - smarter_dev.web.jina_cache_admin:JinaCacheAdminController
