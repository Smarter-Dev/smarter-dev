# Skrift-native API keys — mirrors app.yaml (built-in admin UI at
# /admin/api-keys auto-registers with AdminController).
api_keys:
  enabled: true
  default_expiration_days: 365
  max_keys_per_user: 10

middleware:
  - smarter_dev.web.middleware.partial:create_partial_middleware
  - smarter_dev.web.banner_middleware:SudoLaunchBannerMiddleware

security_headers:
  enabled: false

rate_limit:
  enabled: false

redis:
  url: $REDIS_URL

notifications:
  backend: "skrift.lib.notification_backends:RedisBackend"

workers:
  enabled: true
  # single_node = in-process consumer pool + all-SQLAlchemy (Postgres) backends,
  # so scheduled/timer jobs are durable and survive a web restart (the old
  # `local` preset used in-memory queue/state, which wiped pending jobs on
  # every restart).
  preset: single_node
  queues:
    - agents
  visibility_timeout: 1800
  execution: in_process
  concurrency: 8
  imports:
    - smarter_dev.web.resources_agent
    - smarter_dev.web.title_agent
    - smarter_dev.web.blogging_agent.pipeline
    - smarter_dev.web.handlers_jobs
    - smarter_dev.web.admin_handlers_jobs

agents:
  default_queue: agents
  tool_call_queue: agents
  blob_backend: skrift.agents.blob:InMemoryBlobStore
  default_subagent_dispatch: inline
